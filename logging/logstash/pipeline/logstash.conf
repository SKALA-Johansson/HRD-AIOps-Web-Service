input {
  # 각 서비스에서 Beats (Filebeat) 또는 TCP로 로그 수집
  beats {
    port => 5044
  }

  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # 서비스 이름 기반 태깅
  if [service] == "goal-setter-agent" {
    mutate { add_tag => ["goal-setter"] }
  } else if [service] == "curriculum-designer-agent" {
    mutate { add_tag => ["curriculum-designer"] }
  } else if [service] == "ai-tutor-agent" {
    mutate { add_tag => ["ai-tutor"] }
  } else if [service] == "gateway" {
    mutate { add_tag => ["gateway"] }
  }

  # 타임스탬프 파싱
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # 로그 레벨 정규화
  mutate {
    uppercase => ["level"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "msa-logs-%{+YYYY.MM.dd}"
    action => "index"
  }

  # 디버그용 stdout (운영 시 제거)
  stdout {
    codec => rubydebug
  }
}
