<!DOCTYPE html>
<html lang="ko">
  <head>
    <script>
      (function () {
        try {
          var k = 'shrd_theme'
          var t = localStorage.getItem(k)
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t)
          } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark')
          } else {
            document.documentElement.setAttribute('data-theme', 'light')
          }
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light')
        }
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/images/logo/main_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart HRD AIOps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
