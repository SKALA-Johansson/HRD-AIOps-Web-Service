server:
  port: 9000
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        same-site: lax
        secure: false

spring:
  application:
    name: auth-server
  datasource:
    url: jdbc:mariadb://mariadb:3306/user_profile_db?createDatabaseIfNotExist=true&characterEncoding=UTF-8
    driver-class-name: org.mariadb.jdbc.Driver
    username: root
    password: rootpassword
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect

  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.security: INFO

external:
  curriculum-designer-url: http://curriculum-designer-agent:10022
