server:
  port: 9004

spring:
  application:
    name: learning-service
  datasource:
    url: jdbc:h2:mem:learningdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
